services:
  neo4j:
    image: neo4j:5
    container_name: workgraph-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/workgraph
      NEO4J_server_memory_pagecache_size: 512M
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "workgraph", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  workgraph:
    build: .
    container_name: workgraph-app
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: workgraph
    volumes:
      - ./config:/config
      - ${WATCH_DIR:-~/Documents}:/watch:ro
    # By default just stay up so you can `docker compose exec workgraph workgraph ...`
    command: ["sleep", "infinity"]

volumes:
  neo4j_data:
